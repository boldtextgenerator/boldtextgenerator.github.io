<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us — Bold Text Generator</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23D4891A'/><text x='6' y='24' font-size='22' fill='white' font-weight='900' font-family='Georgia'>𝗕</text></svg>" />
  <link rel="stylesheet" href="css/style.css" />
  
  <style>
    .contact-container { padding: 8rem 0 5rem; max-width: 600px; margin: 0 auto; text-align: center; }
    .contact-card { 
      background: white; 
      border: 1px solid var(--border); 
      border-radius: var(--radius); 
      padding: 4rem 2rem; 
      margin-top: 3rem;
      box-shadow: 0 10px 40px var(--shadow);
    }
    .contact-icon { font-size: 3rem; margin-bottom: 1.5rem; display: block; }
    .contact-email { 
      font-size: 1.5rem; 
      color: var(--gold); 
      font-weight: 700; 
      text-decoration: none;
      word-break: break-all;
      transition: color 0.2s ease;
    }
    .contact-email:hover { color: var(--gold-light); }
    .contact-header h1 { font-family: var(--font-display); font-size: 3rem; color: var(--ink); }
    .contact-text { color: var(--ink-mid); margin-top: 1rem; font-size: 1.1rem; }
    .btn-contact { margin-top: 2rem; display: inline-block; }
  </style>
</head>
<body>

  <header id="site-header" role="banner"></header>

  <main class="container">
    <div class="contact-container animate-in visible">
      <div class="contact-header">
        <div class="section-tag">Get in Touch</div>
        <h1>Contact Us</h1>
        <p class="contact-text">Have a suggestion, a bug report, or a business inquiry? We'd love to hear from you.</p>
      </div>

      <div class="contact-card">
        <span class="contact-icon">📧</span>
        <p style="margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; font-size: 0.8rem; color: var(--ink-mid);">Send an Email</p>
        <a href="mailto:nolushac@gmail.com" class="contact-email">nolushac@gmail.com</a>
        
        <div style="margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--gold-pale);">
          <p class="contact-text" style="font-size: 0.95rem;">Typically responds within 24-48 business hours.</p>
        </div>
      </div>
    </div>
  </main>

  <footer id="site-footer" role="contentinfo"></footer>

  <script src="js/header.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
